aid: chargedesk
name: ChargeDesk
description: >
  ChargeDesk is a payment management portal providing a REST API for creating
  and managing charges, subscriptions, refunds, and customer billing across
  Stripe, Braintree, PayPal, Authorize.Net, WooCommerce, Shopify, Square,
  GoCardless, and 14+ other payment gateways. It integrates directly with
  helpdesk platforms including Zendesk, Freshdesk, Intercom, HubSpot, Help
  Scout, and Front, enabling support teams to handle billing operations without
  leaving their customer support workflow.
