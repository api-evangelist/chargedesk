apis:
  - name: ChargeDesk REST API
    description: >
      RESTful API for managing charges, customers, subscriptions, products, and
      webhooks across multiple payment gateways. Supports creating and
      capturing charges, processing refunds, cancelling subscriptions,
      requesting payments, and managing customer data. Base URL is
      https://api.chargedesk.com/v1.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
